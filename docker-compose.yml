services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: noteshub
      POSTGRES_USER: noteshub
      POSTGRES_PASSWORD: noteshub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noteshub"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - noteshub/.env
    environment:
      DATABASE_URL: postgres://noteshub:noteshub@db:5432/noteshub
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             gunicorn noteshub.wsgi:application --bind 0.0.0.0:8000 --workers 2"

volumes:
  postgres_data:
